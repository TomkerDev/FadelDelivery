version: '3.8'

services:
  # 🌐 REVERSE PROXY : Gère le trafic entrant et le SSL
  gateway:
    image: nginx:alpine
    container_name: fadel_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - fadel_network

  # ⚙️ BACKEND : Node.js Stateless
  backend:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile # Utiliser un Dockerfile de prod (multi-stage)
    container_name: fadel_backend
    restart: always
    environment:
      # Utilisation des noms de services Docker comme host
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fadel_network

  # 🐘 DATABASE : PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: fadel_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fadel_network

  # ⚡ CACHE : Redis 7 (GPS & Events)
  redis:
    image: redis:7-alpine
    container_name: fadel_redis
    restart: always
    command: redis-server --appendonly yes # Persistance des données Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    networks:
      - fadel_network
  
  prisma-studio:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: fadel_prisma_studio
    command: npx prisma studio --browser none
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - postgres
    networks:
      - fadel_network

networks:
  fadel_network:
    driver: bridge

volumes:
  postgres_data:
